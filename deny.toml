# cargo-deny 配置 - 见 ADR-012 license matrix
# 用法: cargo deny check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ----------------------------------------------------------------------
# 漏洞扫描 (RustSec advisory DB)
# ----------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# ----------------------------------------------------------------------
# License 白名单 - 见 ADR-012
# ----------------------------------------------------------------------
[licenses]
confidence-threshold = 0.9
allow = [
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OFL-1.1",
    "Bitstream-Vera",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
# 显式拒绝（双保险，避免 confidence 误判）
exceptions = []

# 个别 crate 没有标准 SPDX 字段时（罕见），手动确认
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ----------------------------------------------------------------------
# Banned crates - 重复/废弃/有更好替代品
# ----------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    # OpenSSL: 我们用 rustls，避免引入 C 依赖
    # （注意：lopdf/image 默认不依赖 openssl-sys，此规则为防御性）
    { name = "openssl-sys" },
]

skip = []
skip-tree = []

# ----------------------------------------------------------------------
# Sources - 只允许 crates.io 和 git（无）
# ----------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
