name: audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    # 每周一 03:00 UTC 跑一次，捕捉新 advisory
    - cron: "0 3 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 5
  RUSTUP_MAX_RETRIES: 5

jobs:
  # ------------------------------------------------------------------
  # cargo-deny: license + source + ban + advisory（综合）
  # ------------------------------------------------------------------
  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          rust-version: stable
          # 用项目根 deny.toml
          arguments: --workspace --all-features

  # ------------------------------------------------------------------
  # cargo-audit: 独立的 RustSec 扫描（与 deny advisories 互为冗余
  # 但 audit 报告格式更适合 SARIF 上传到 GitHub Security）
  # ------------------------------------------------------------------
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-audit-v1

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo-audit
        run: cargo audit --deny warnings
